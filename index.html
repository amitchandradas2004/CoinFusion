<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <!-- CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .space-grotesk {
        font-family: "Space Grotesk", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
    </style>
  </head>
  <body class="space-grotesk">
    <header class="bg-black">
      <nav class="container mx-auto py-5 h-[80px]">
        <div class="flex justify-between items-center">
          <h2 class="text-[#5846FB] text-[30px] font-medium pl-3 md:pl-0">
            CoinFusion
          </h2>
          <div
            class="flex hidden md:inline-flex py-5 px-10 rounded-full gap-5 bg-white"
          >
            <p class="text-[20px]">Learn</p>
            <p class="text-[20px]">Build</p>
            <p class="text-[20px]">Explore</p>
            <p class="text-[20px]">Join</p>
            <p class="text-[20px]">Help</p>
          </div>
          <div></div>

          <!-- Drawer -->
          <div class="drawer lg:drawer-open block md:hidden pl-25 md:pl-0">
            <input id="my-drawer-3" type="checkbox" class="drawer-toggle" />
            <div
              class="drawer-content flex flex-col items-center justify-center"
            >
              <!-- Page content here -->
              <label for="my-drawer-3" class="drawer-button lg:hidden">
                <i
                  class="fa-solid fa-bars"
                  style="color: rgb(255, 255, 255)"
                ></i>
              </label>
            </div>
            <div class="drawer-side">
              <label
                for="my-drawer-3"
                aria-label="close sidebar"
                class="drawer-overlay"
              ></label>
              <ul
                class="menu bg-base-200 min-h-100 w-50 p-4 mt-5 rounded-r-3xl gap-2"
              >
                <!-- Sidebar content here -->
                <li><a class="btn btn-primary">Learn</a></li>
                <li><a class="btn btn-primary">Build</a></li>
                <li><a class="btn btn-primary">Explore</a></li>
                <li><a class="btn btn-primary">Join</a></li>
                <li><a class="btn btn-primary">Help</a></li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </header>
  </body>
</html>
